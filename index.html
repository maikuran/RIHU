<!DOCTYPE html>

<html>
    <head>
        <title>RIHU - Revolution Idle: Hyperoperation UP</title>
        <link rel="stylesheet" type="text/css" href="styling/looks.css">
        <meta charset="UTF-8">
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #1a1a1a;
                color: #fff;
            }
            
            #topSection {
                min-width: 500px;
                min-height: 150px;
                margin: auto;
                padding: 20px;
                background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
                border-radius: 10px;
                border: 2px solid #444;
            }
            
            #pointsDisplay {
                font-size: 32px;
                font-weight: bold;
                color: #4ade80;
                margin: 10px 0;
            }
            
            #genDisplay {
                font-size: 20px;
                color: #60a5fa;
                margin: 10px 0;
            }
            
            #prestige-info {
                font-size: 18px;
                color: #fbbf24;
                margin: 10px 0;
            }
            
            #infinity-info {
                font-size: 18px;
                color: #a78bfa;
                margin: 10px 0;
            }
            
            #eternity-info {
                font-size: 18px;
                color: #f472b6;
                margin: 10px 0;
            }
            
            .button-row {
                display: flex;
                gap: 10px;
                margin-top: 15px;
                flex-wrap: wrap;
            }
            
            .reset-btn {
                padding: 12px 24px;
                font-size: 16px;
                font-weight: bold;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                transition: all 0.3s;
            }
            
            #prestigeBtn {
                background-color: #f59e0b;
                color: #000;
            }
            
            #prestigeBtn:hover {
                background-color: #fbbf24;
                transform: scale(1.05);
            }
            
            #infinityBtn {
                background-color: #a78bfa;
                color: #fff;
            }
            
            #infinityBtn:hover {
                background-color: #c4b5fd;
                transform: scale(1.05);
            }
            
            #eternityBtn {
                background-color: #f472b6;
                color: #fff;
            }
            
            #eternityBtn:hover {
                background-color: #f9a8d4;
                transform: scale(1.05);
            }
            
            #mainTab {
                margin: 20px auto;
                max-width: 1500px;
            }
            
            .main-content {
                display: flex;
                gap: 20px;
                margin: auto;
                max-width: 1500px;
                padding: 20px;
                background: #2a2a2a;
                border-radius: 10px;
            }
            
            #lapUpgrades {
                width: 350px;
                height: 600px;
                overflow-y: auto;
                background: #1a1a1a;
                border: 2px solid #444;
                border-radius: 10px;
                padding: 10px;
                flex-shrink: 0;
            }
            
            #mainCanvasDiv {
                flex: 1;
                min-width: 400px;
                height: 600px;
                background: #000;
                border: 2px solid #444;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            #mainCanvas {
                max-width: 100%;
                max-height: 100%;
            }
            
            #formula {
                display: block;
                margin-top: 20px;
                padding: 15px;
                background: #2a2a2a;
                border: 2px solid #444;
                border-radius: 10px;
                text-align: center;
                font-size: 24px;
                font-family: "CMU Serif", serif;
                max-width: 1500px;
                margin-left: auto;
                margin-right: auto;
            }
            
            /* スクロールバーのスタイル */
            #lapUpgrades::-webkit-scrollbar {
                width: 8px;
            }
            
            #lapUpgrades::-webkit-scrollbar-track {
                background: #1a1a1a;
            }
            
            #lapUpgrades::-webkit-scrollbar-thumb {
                background: #444;
                border-radius: 4px;
            }
            
            #lapUpgrades::-webkit-scrollbar-thumb:hover {
                background: #666;
            }
        </style>
    </head>

    <body>
        <!-- トップセクション: ポイント表示、リセット機能 -->
        <div id="topSection">
            <h1>RIHU - Revolution Idle: Hyperoperation UP</h1>
            
            <div id="pointsDisplay">
                Points: <span id="points">0</span>
            </div>
            
            <div id="genDisplay">
                Generation: <span id="pointGen">0</span> /sec
            </div>
            
            <!-- Prestige情報 -->
            <div id="prestige-info">
                Prestige: <span id="prestigeCount">0</span> (×<span id="prestigeMultiplier">1.00</span>)
            </div>
            
            <!-- Infinity情報 -->
            <div id="infinity-info">
                Infinity: <span id="infinityCount">0</span>
            </div>
            
            <!-- Eternity情報 -->
            <div id="eternity-info">
                Eternity: <span id="eternityCount">0</span>
            </div>
            
            <!-- リセットボタン -->
            <div class="button-row">
                <button class="reset-btn" id="prestigeBtn" onclick="doPrestige()">Prestige</button>
                <button class="reset-btn" id="infinityBtn" onclick="manualInfinity()">Infinity (Auto)</button>
                <button class="reset-btn" id="eternityBtn" onclick="manualEternity()">Eternity (Auto)</button>
            </div>
        </div>
        
        <!-- メインコンテンツ: リング選択とキャンバス -->
        <div id="mainTab">
            <div class="main-content">
                <div id="lapUpgrades"></div>
                <div id="mainCanvasDiv">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </div>
            
            <!-- 数式表示 -->
            <span id="formula"></span>
        </div>

        <!-- LIBRARIES -->
        <script src="js/lib/ExpantaNum.js"></script>

        <!-- CORE -->
        <script src="js/core/main.js"></script>
        
        <!-- UI更新用追加スクリプト -->
        <script>
            // 画面更新関数を拡張
            const originalUpdate = update
            function updateWithUI() {
                originalUpdate()
                document.getElementById("prestigeCount").innerHTML = player.prestige
                document.getElementById("prestigeMultiplier").innerHTML = player.prestigeBonus.toFixed(2)
                document.getElementById("infinityCount").innerHTML = player.infinity
                document.getElementById("eternityCount").innerHTML = player.eternity
            }
            
            // setIntervalを上書き
            const originalInterval = window.setInterval
            window.setInterval = function(callback, delay) {
                return originalInterval(function() {
                    mainLoop()
                    updateWithUI()
                }, delay)
            }
        </script>
    </body>
</html>
